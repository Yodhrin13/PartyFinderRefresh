name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download Dalamud
        run: |
          mkdir -p $DALAMUD_HOME
          curl -sL https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -o /tmp/dalamud.zip
          unzip -o /tmp/dalamud.zip -d $DALAMUD_HOME

      - name: Restore
        run: dotnet restore PartyFinderRefresher/PartyFinderRefresher.csproj

      - name: Build
        run: dotnet build PartyFinderRefresher/PartyFinderRefresher.csproj --configuration Release --no-restore

      - name: Find build output
        run: find . -name "PartyFinderRefresher.dll" 2>/dev/null

      - name: List build output
        run: ls -la PartyFinderRefresher/bin/Release/

      - name: Package
        run: |
          mkdir -p latest_contents
          cp -r PartyFinderRefresher/bin/Release/* latest_contents/

          if [ ! -f "latest_contents/PartyFinderRefresher.dll" ]; then
            echo "ERROR: PartyFinderRefresher.dll not found in package"
            ls -la latest_contents/
            exit 1
          fi

          cd latest_contents
          zip -r $GITHUB_WORKSPACE/latest.zip .

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PartyFinderRefresher ${{ github.ref_name }}
          generate_release_notes: true
          files: latest.zip

      - name: Update repo.json
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TIMESTAMP=$(date +%s)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.zip"

          jq --arg ver "$VERSION" \
             --arg ts "$TIMESTAMP" \
             --arg dl "$DOWNLOAD_URL" \
             --arg icon "https://raw.githubusercontent.com/${{ github.repository }}/main/images/icon.png" \
             '.[0].AssemblyVersion = $ver |
              .[0].TestingAssemblyVersion = $ver |
              .[0].DownloadLinkInstall = $dl |
              .[0].DownloadLinkTesting = $dl |
              .[0].DownloadLinkUpdate = $dl |
              .[0].LastUpdate = ($ts | tonumber) |
              .[0].IconUrl = $icon' \
             repo.json > repo.tmp && mv repo.tmp repo.json

      - name: Commit repo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add repo.json
          git commit -m "chore: update repo.json for ${{ github.ref_name }}" || true
          git push